<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <link href="./app/bootstrap/bootstrap.min.css" rel="stylesheet">
  <script src="./app/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="./app/jquery/jquery-4.0.0.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">

    <h3 class="mb-3">Quiz App</h3>

    <div id="timer" class="fw-bold text-danger mb-3"></div>

    <div id="questionCounter" class="fw-bold mb-2"></div>

    <p id="question"></p>

    <div id="options" class="mt-3"></div>

    <button id="nextBtn" class="btn btn-primary mt-3">Next</button>

    <p id="feedback" class="mt-3 fw-bold"></p>

  </div>
</div>

<script src="./app/quiz.js"></script>
</body>
</html>
